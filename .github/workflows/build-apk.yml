name: Build Android APK

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:  # 允许手动触发

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write  # 需要写权限来创建Release
      
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      
    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
        
    - name: Setup Android SDK
      uses: android-actions/setup-android@v3
      
    - name: Cache Gradle packages
      uses: actions/cache@v3
      with:
        path: |
          ~/.gradle/caches
          ~/.gradle/wrapper
        key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
        restore-keys: |
          ${{ runner.os }}-gradle-
          
    - name: Grant execute permission for gradlew
      run: chmod +x gradlew
      
    - name: Create gradle wrapper jar
      run: |
        mkdir -p gradle/wrapper
        curl -L -o gradle/wrapper/gradle-wrapper.jar https://github.com/gradle/gradle/raw/v8.4.0/gradle/wrapper/gradle-wrapper.jar
        
    - name: Build Debug APK
      run: ./gradlew assembleDebug --stacktrace
      
    - name: Upload APK as artifact
      uses: actions/upload-artifact@v4
      with:
        name: travel-record-app-debug-${{ github.run_number }}
        path: app/build/outputs/apk/debug/app-debug.apk
        retention-days: 30
        
    - name: Create Release
      if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master'
      uses: softprops/action-gh-release@v2
      with:
        tag_name: v1.0.${{ github.run_number }}
        name: Travel Record App v1.0.${{ github.run_number }}
        body: |
          🧳 Android旅游记录应用 - 自动构建版本
          
          **构建信息**
          - 构建编号: ${{ github.run_number }}
          - 提交SHA: ${{ github.sha }}
          - 分支: ${{ github.ref_name }}
          
          ## 功能特性
          - ✅ 旅游记录管理
          - ✅ 旅游过程记录
          - ✅ 开销管理和统计
          - ✅ Material Design 3界面
          - ✅ 本地数据存储
          
          ## 安装说明
          1. 下载下方的 `app-debug.apk` 文件
          2. 在Android设备上启用"未知来源"安装
          3. 安装APK文件
          
          ## 系统要求
          - Android 5.0 (API 21) 或更高版本
        files: app/build/outputs/apk/debug/app-debug.apk
        draft: false
        prerelease: false
        fail_on_unmatched_files: true
        generate_release_notes: false
      continue-on-error: true  # 如果Release创建失败，不影响整个工作流
